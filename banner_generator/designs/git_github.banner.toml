
# Git Workflows – commit log, badges, terminal
theme = "tech"
size = "og"

series = "STATIC, BUT SMARTER"
title = "Git Mastery"
subtitle = "Branching strategies and collaborative workflows"
meta = "Article 4 · Version Control"
progress = "Part 4 of 8"
tagline = "Stop fearing merge conflicts"

[components]
show_background      = true
show_title           = true
show_meta_progress   = true
show_tagline         = true
show_credits         = true
show_badge           = true
show_icon            = true
show_terminal        = true
show_watermark       = true
show_decorations     = true
show_status_badges   = true
show_social_icons    = true
show_git             = true

[credits]
line1 = "MOSAID Tutorials"
line2 = "mosaid.xyz"

[icon]
type = "github"
x = 95
y = 465
scale = 1.2

[terminal]
commands = [
    "git checkout -b feature/new-docs",
    "git add . && git commit -m 'Add docs'",
    "git push origin feature/new-docs",
    "gh pr create --fill"
]
show_serving = false
typing = true

[git]
commits = [
    "a1b2c3d Add banner generator",
    "e4f5g6h Fix theme loading",
    "i7j8k9l Update README",
    "m0n1p2q Merge pull request #42"
]
x = 85
y = 380
max_lines = 5
show_branch = true
branch_name = "main"

[status_badges]
badges = ["git", "github-actions", "open-source"]
x = 230
y = 579

[layout]
title_font_size      = 44
subtitle_font_size   = 16
title_x              = 85
subtitle_x           = 85
title_align          = "start"
subtitle_align       = "start"
title_max_width      = 660
subtitle_max_width   = 660
title_margin_top     = 120
title_line_height    = 48
subtitle_line_height = 24

[badge]
text = "GIT WORKFLOWS"
x = 85
y = 25
width = 220
height = 36
font_size = 16
align = "start"

[watermark]
opacity = 0.45
scale = 0.8
rotate_dur = "30s"

[decorations]
code_rain = false
floating_geometry = true
scanlines = true
pulsing_bracket = true

[social_icons]
icons = ["github", "twitter", "youtube"]
x = 85
y = 590
size = 24
gap = 12
