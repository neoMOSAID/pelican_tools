
# Linux Homelab Setup – terminal, neofetch, package badges
theme = "dracula"
size = "og"

series = "STATIC, BUT SMARTER"
title = "Build Your Homelab From Scratch"
subtitle = "A practical guide to self‑hosting services on bare metal"
meta = "Article 5 · Homelab Infrastructure"
progress = "Part 5 of 12"
tagline = "Your own cloud, your own rules"

[components]
show_background      = true
show_title           = true
show_meta_progress   = true
show_tagline         = true
show_credits         = true
show_badge           = true
show_icon            = true
show_terminal        = true
show_watermark       = true
show_decorations     = true
show_status_badges   = true
show_social_icons    = true
show_sysinfo         = true
show_bash_prompt     = true
show_package_list    = true
show_ascii_logo      = true

[credits]
line1 = "MOSAID Tutorials"
line2 = "mosaid.xyz"

[icon]
type = "tux"
x = 95
y = 465
scale = 1.2

[terminal]
commands = [
    "ssh mosaid@homelab",
    "sudo apt update && sudo apt upgrade -y",
    "docker compose up -d",
    "nginx -t && systemctl reload nginx"
]
show_serving = true
typing = true

[sysinfo]
logo = "arch"
entries = [
    "OS: Debian 12",
    "Kernel: 6.1.0",
    "Uptime: 14 days",
    "Shell: zsh",
    "Packages: 843 (apt)"
]
x = 85
y = 340

[bash_prompt]
prompt = "[mosaid@homelab ~]$"
x = 85
y = 520

[package_list]
packages = ["nginx", "docker", "ufw", "fail2ban"]
x = 85
y = 558

[ascii_logo]
art = "tux"
x = 1050
y = 120
scale = 2.2
opacity = 0.08

[status_badges]
badges = ["self-hosted", "high‑availability", "backup"]
x = 230
y = 579

[layout]
title_font_size      = 44
subtitle_font_size   = 16
title_x              = 85
subtitle_x           = 85
title_align          = "start"
subtitle_align       = "start"
title_max_width      = 660
subtitle_max_width   = 660
title_margin_top     = 120
title_line_height    = 48
subtitle_line_height = 24

[badge]
text = "HOMELAB ESSENTIALS"
x = 85
y = 25
width = 220
height = 36
font_size = 16
align = "start"

[watermark]
opacity = 0.35
scale = 0.7
rotate_dur = "40s"

[decorations]
code_rain = true
floating_geometry = true
scanlines = true
pulsing_bracket = false

[social_icons]
icons = ["github", "twitter", "youtube"]
x = 85
y = 590
size = 24
gap = 12
