
theme = "fantasy_book"          # dark gold/copper theme
size = "custom"

[canvas]
width  = 600
height = 900

title    = "The Shadow of the High King"
subtitle = "Book One of the Covenant of Light"
meta     = "656 pages · Epic Fantasy"
tagline  = "A throne of ashes, a prophecy of fire"

[components]
show_background        = true
show_title             = true
show_meta_progress     = true
show_tagline           = true
show_credits           = true
show_badge             = true
show_ornamental_border = true
show_central_emblem    = true
show_author_plate      = true
show_geometric_shapes  = true
show_watermark         = false
show_social_icons      = false
show_terminal          = false
show_status_badges     = false
show_decorations       = false

[credits]
line1 = ""
line2 = "MOSAID Books"

[badge]
text = "THE COVENANT OF LIGHT · BOOK I"
x = 90
y = 68
width  = 420
height = 36
font_size = 12
align = "start"

# Elegant double border with corner pieces
[ornamental_border]
margin = 24
outer_stroke = "#d4af37"   # gold
inner_stroke = "#b8860b"   # copper
corner_size = 32
double_line = true

# Central shield emblem
[central_emblem]
style = "shield"
x = 300
y = 360
size = 130
fill = "none"
stroke = "#d4af37"
stroke_width = 2.5
opacity = 0.7

# Author name at the bottom
[author_plate]
author = "E. L. MORNINGSTAR"
x = 300
y = 800
font_size = 20
color = "#e6c27a"
align = "middle"
show_rule = true
rule_width = 240

# Page count and series progress bar
[meta_progress]
x = 90
y_offset = -10
font_size = 12
show_progress = true
progress_bar_width = 420
progress_y_offset = 28

# Custom layout – title starts lower to accommodate the central emblem
[layout]
title_margin_top = 520
title_font_size = 48
title_line_height = 56
title_max_width = 420
title_align = "start"
title_x = 90

subtitle_font_size = 20
subtitle_line_height = 28
subtitle_max_width = 420
subtitle_y = 620      # absolute Y after title

# Decorative geometric bars – vertical and horizontal accents
[geometric_shapes]
vertical_bars = [
    { x = 40,  y = 80, width = 4, height = 740, color = "#d4af37", opacity = 0.4 },
    { x = 556, y = 80, width = 4, height = 740, color = "#d4af37", opacity = 0.4 }
]
horizontal_bars = [
    { x = 40, y = 60, width = 520, height = 2, color = "#e6c27a", opacity = 0.6 },
    { x = 40, y = 820, width = 520, height = 2, color = "#e6c27a", opacity = 0.6 }
]
circles = [
    { cx = 300, cy = 280, r = 180, fill = "none", stroke = "#d4af37", stroke_width = 1, opacity = 0.15 },
    { cx = 300, cy = 280, r = 120, fill = "none", stroke = "#e6c27a", stroke_width = 0.8, opacity = 0.2 }
]
rectangles = [
    { x = 60, y = 100, width = 480, height = 700, fill = "none", stroke = "#b8860b", stroke_width = 1.5, opacity = 0.3 }
]
