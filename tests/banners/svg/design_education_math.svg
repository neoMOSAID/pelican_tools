<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet" width="1200" height="630">
  <defs>
<!-- Background gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="50%" stop-color="#16213e" />
      <stop offset="100%" stop-color="#0f3460" />
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="50%" stop-color="#000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000" stop-opacity="0.35" />
    </radialGradient>
    <linearGradient id="keyLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>

    <!-- Patterns -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#94a3b8" opacity="0.12" />
    </pattern>
    <pattern id="grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#94a3b8" stroke-width="0.5" opacity="0.06" />
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="2" x2="4" y2="2" stroke="#ffffff" stroke-width="1" opacity="0.03" />
    </pattern>

    <!-- Title gradient & filters -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560" />
      <stop offset="50%" stop-color="#ff6b6b" />
      <stop offset="100%" stop-color="#c4f1ff" />
    </linearGradient>
    <filter id="titleShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
      <feFlood flood-color="#94a3b8" flood-opacity="0.25" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Terminal glow -->
    <filter id="termGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur" />
      <feFlood flood-color="#94a3b8" flood-opacity="0.15" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Progress gradients -->
    
    <linearGradient id="progressGradLow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a6e3a1" />
      <stop offset="100%" stop-color="#cdd6f4" />
    </linearGradient>
    <linearGradient id="progressGradMid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f9e2af" />
      <stop offset="100%" stop-color="#cdd6f4" />
    </linearGradient>
    <linearGradient id="progressGradHigh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f38ba8" />
      <stop offset="100%" stop-color="#cdd6f4" />
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Vignette + key light -->
  <rect width="1200" height="630" fill="url(#vignette)" pointer-events="none" />
  <rect width="1200" height="630" fill="url(#keyLight)" pointer-events="none" />
  <!-- Title block -->
  <text x="85" y="30" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="68" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" opacity="0.3" filter="url(#titleGlow)">The</text>
  <text x="85" y="30" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="68" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" filter="url(#titleShadow)">The</text>
  <text x="85" y="111" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="68" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" opacity="0.3" filter="url(#titleGlow)">Pythagorean</text>
  <text x="85" y="111" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="68" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" filter="url(#titleShadow)">Pythagorean</text>
  <text x="85" y="192" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="68" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" opacity="0.3" filter="url(#titleGlow)">Theorem</text>
  <text x="85" y="192" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="68" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" filter="url(#titleShadow)">Theorem</text>
  <rect x="85" y="243" width="360" height="3" rx="1.5" fill="url(#titleGrad)" opacity="0.35" filter="url(#titleGlow)" />
  <text x="85" y="293" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="38" fill="#a6adc8" font-weight="600"  text-anchor="start" >a² + b² = c²</text>
  <!-- Meta & progress -->
  <text x="85" y="382" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="22" fill="#6c7086" font-weight="600" text-anchor="start">Article 4 · Geometry</text>
  <rect x="85" y="407" width="560" height="6" rx="3" fill="#313244" />
  <rect x="85" y="407" width="280" height="6" rx="3" fill="url(#progressGradMid)" />
  <text x="85" y="431" font-family="'JetBrains Mono', monospace" font-size="13" fill="#6c7086">Part 4 of 8</text>

  <!-- Separator & tagline -->
  <line x1="85" y1="527" x2="645" y2="527" stroke="#45475a" stroke-width="0.5" opacity="0.5" />
  <text x="85" y="548" font-family="'Inter', sans-serif" font-size="16"
        fill="#6c7086" font-style="italic" text-anchor="start">
    Where numbers meet reality
  </text>

  <!-- Series badge -->
  <rect x="85" y="85" width="220" height="36" rx="18"
        fill="#313244" opacity="0.8" stroke="#94a3b8" stroke-width="1.5" />
  <text x="97.0" y="103.0" font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="16" fill="#cdd6f4" font-weight="600"
        text-anchor="start" dominant-baseline="central" letter-spacing="1.5">Math Explained</text>

<rect x="85" y="522" width="500" height="84" rx="8" fill="#313244" stroke="#6272a4" stroke-width="1.5" />
<text x="100" y="542" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#50fa7b">Right Triangle</text>
<text x="100" y="566" font-family="'Inter', sans-serif" font-size="16" fill="#cdd6f4">A triangle with one angle equal to 90 degrees. The side oppo</text>
<text x="100" y="588" font-family="'Inter', sans-serif" font-size="16" fill="#cdd6f4">site the right angle is the hypotenuse.</text>
<text x="85" y="781" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#f8f8f2">Common Pythagorean Triples</text>
<rect x="85" y="919" width="40" height="37" rx="4" fill="#50fa7b" opacity="0.8" />
<text x="105.0" y="971" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#cdd6f4">3-4-5</text>
<text x="105.0" y="914" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#cdd6f4">25</text>
<rect x="145" y="866" width="40" height="90" rx="4" fill="#50fa7b" opacity="0.8" />
<text x="165.0" y="971" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#cdd6f4">5-12-13</text>
<text x="165.0" y="861" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#cdd6f4">60</text>
<rect x="205" y="806" width="40" height="150" rx="4" fill="#50fa7b" opacity="0.8" />
<text x="225.0" y="971" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#cdd6f4">8-15-17</text>
<text x="225.0" y="801" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#cdd6f4">100</text>
<text x="85" y="741" font-family="'Times New Roman', 'STIXGeneral', 'Latin Modern Math', serif" font-style="italic" font-size="28" fill="#ffd93d" text-anchor="start">a<tspan dy="-6" font-size="0.7em">2</tspan> + b<tspan dy="-6" font-size="0.7em">2</tspan> = c<tspan dy="-6" font-size="0.7em">2</tspan></text>

    <!-- Credits -->
    <text x="1170" y="580" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18"
            fill="#6c7086" font-weight="600" text-anchor="end">MOSAID Tutorials</text>
    <text x="1170" y="600" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14"
            fill="#6c7086" text-anchor="end" opacity="0.8">mosaid.xyz</text>
</svg>