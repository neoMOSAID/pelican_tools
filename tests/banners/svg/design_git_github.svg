  <text x="248.8" y="593.0" text-anchor="middle" dominant-baseline="central" font-family="'JetBrains Mono', monospace" font-size="12" fill="#cdd6f4">git</text>
  <rect x="275.6" y="579" width="116.79999999999998" height="28" rx="4" fill="#313244" opacity="0.7" stroke="#94a3b8" stroke-width="1" />
  <text x="334.0" y="593.0" text-anchor="middle" dominant-baseline="central" font-family="'JetBrains Mono', monospace" font-size="12" fill="#cdd6f4">github-actions</text>
  <rect x="400.4" y="579" width="95.19999999999999" height="28" rx="4" fill="#313244" opacity="0.7" stroke="#94a3b8" stroke-width="1" />
  <text x="448.0" y="593.0" text-anchor="middle" dominant-baseline="central" font-family="'JetBrains Mono', monospace" font-size="12" fill="#cdd6f4">open-source</text>
  <!-- Social icons -->
  <svg x="85" y="578.0" width="24" height="24" viewBox="0 0 24 24" fill="#94a3b8" opacity="0.8"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.757-1.333-1.757-1.09-.745.083-.73.083-.73 1.205.085 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.604-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/></svg>
