  <!-- Series badge -->
  <rect x="85" y="25" width="220" height="36" rx="18"
        fill="#313244" opacity="0.8" stroke="#94a3b8" stroke-width="1.5" />
  <text x="97.0" y="43.0" font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="16" fill="#cdd6f4" font-weight="600"
        text-anchor="start" dominant-baseline="central" letter-spacing="1.5">GIT WORKFLOWS</text>

  <!-- Status badges -->
