        <circle cx="738" cy="96" r="6" fill="#fab387" />
        <circle cx="758" cy="96" r="6" fill="#a6e3a1" />
        <text x="920" y="100" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12" fill="#a6adc8" text-anchor="middle" font-weight="500">Terminal — mosaid@mosaid-pc pelican-dev</text>

        <line x1="720" y1="122" x2="720" y2="256" stroke="#45475a" stroke-width="1" opacity="0.3" />

        <text x="718" y="132" font-family="'JetBrains Mono', monospace" font-size="14" fill="#585b70" opacity="0.6" text-anchor="end">1</text><text x="735" y="132" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="18" fill="#a6adc8" xml:space="preserve"><tspan font-weight="bold" fill="#94e2d5">$</tspan> <tspan fill="#a6e3a1" font-weight="bold">git</tspan> <tspan fill="#a6adc8" >checkout</tspan> <tspan fill="#94e2d5" >-b</tspan> <tspan fill="#a6adc8" >feature/new-docs</tspan></text><text x="718" y="160" font-family="'JetBrains Mono', monospace" font-size="14" fill="#585b70" opacity="0.6" text-anchor="end">2</text><text x="735" y="160" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="18" fill="#a6adc8" xml:space="preserve"><tspan font-weight="bold" fill="#94e2d5">$</tspan> <tspan fill="#a6e3a1" font-weight="bold">git</tspan> <tspan fill="#a6adc8" >add</tspan> <tspan fill="#f5c2e7" >.</tspan> <tspan fill="#a6adc8" >&amp;&amp;</tspan> <tspan fill="#a6e3a1" font-weight="bold">git</tspan> <tspan fill="#a6adc8" >commit</tspan> <tspan fill="#94e2d5" >-m</tspan> <tspan fill="#a6adc8" >'Add</tspan></text><text x="756" y="182" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="18" fill="#a6adc8" xml:space="preserve"><tspan fill="#a6adc8" >docs'</tspan></text><text x="718" y="210" font-family="'JetBrains Mono', monospace" font-size="14" fill="#585b70" opacity="0.6" text-anchor="end">3</text><text x="735" y="210" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="18" fill="#a6adc8" xml:space="preserve"><tspan font-weight="bold" fill="#94e2d5">$</tspan> <tspan fill="#a6e3a1" font-weight="bold">git</tspan> <tspan fill="#a6adc8" >push</tspan> <tspan fill="#a6adc8" >origin</tspan> <tspan fill="#a6adc8" >feature/new-docs</tspan></text><text x="718" y="238" font-family="'JetBrains Mono', monospace" font-size="14" fill="#585b70" opacity="0.6" text-anchor="end">4</text><text x="735" y="238" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="18" fill="#cdd6f4" xml:space="preserve"><tspan font-weight="bold" fill="#94e2d5">$</tspan> <tspan fill="#a6adc8" >gh</tspan> <tspan fill="#a6adc8" >pr</tspan> <tspan fill="#a6adc8" >create</tspan> <tspan fill="#94e2d5" >--fill</tspan> <tspan fill="#f6a2d2" font-weight="bold"><animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />█</tspan></text>
        
        <rect x="1124" y="116" width="6" height="166" rx="3" fill="#45475a" opacity="0.3" /><rect x="1125" y="121" width="4" height="132.8" rx="2" fill="#6c7086" opacity="0.5" />
    </g>
<text x="85" y="292" font-family="'JetBrains Mono', monospace" font-size="13" fill="#50fa7b" font-weight="bold"> main</text>
<text x="85" y="314" font-family="'JetBrains Mono', monospace" font-size="13" fill="#a6adc8">a1b2c3d Add banner generator</text>
