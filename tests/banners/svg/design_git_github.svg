<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet" width="1200" height="630">
  <defs>
<!-- Background gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="50%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="50%" stop-color="#000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000" stop-opacity="0.35" />
    </radialGradient>
    <linearGradient id="keyLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>

    <!-- Patterns -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#94a3b8" opacity="0.12" />
    </pattern>
    <pattern id="grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#94a3b8" stroke-width="0.5" opacity="0.06" />
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="2" x2="4" y2="2" stroke="#ffffff" stroke-width="1" opacity="0.03" />
    </pattern>

    <!-- Title gradient & filters -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0eafc" />
      <stop offset="50%" stop-color="#b8c6db" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <filter id="titleShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
      <feFlood flood-color="#94a3b8" flood-opacity="0.25" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Terminal glow -->
    <filter id="termGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur" />
      <feFlood flood-color="#94a3b8" flood-opacity="0.15" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Progress gradients -->
    
    <linearGradient id="progressGradLow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a6e3a1" />
      <stop offset="100%" stop-color="#cdd6f4" />
    </linearGradient>
    <linearGradient id="progressGradMid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f9e2af" />
      <stop offset="100%" stop-color="#cdd6f4" />
    </linearGradient>
    <linearGradient id="progressGradHigh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f38ba8" />
      <stop offset="100%" stop-color="#cdd6f4" />
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Vignette + key light -->
  <rect width="1200" height="630" fill="url(#vignette)" pointer-events="none" />
  <rect width="1200" height="630" fill="url(#keyLight)" pointer-events="none" />

  <!-- Watermark (single, rotating vector) -->
  <g transform="translate(740.00, 430.00) scale(0.8)" opacity="0.45">
    <g>
      <animateTransform attributeName="transform" type="rotate"
        from="0 100.00 100.00" to="360 100.00 100.00"
        dur="30s" repeatCount="indefinite" />
      <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="stripes" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="3" fill="#00ccff"/>
      <rect y="3" width="6" height="3" fill="transparent"/>
    </pattern>
    <clipPath id="topHalf"><rect x="0" y="0" width="200" height="85"/></clipPath>
    <clipPath id="bottomHalf"><rect x="0" y="115" width="200" height="85"/></clipPath>
  </defs>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#00ccff" stroke-opacity="0.6" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="90" fill="url(#stripes)" clip-path="url(#topHalf)"/>
  <circle cx="100" cy="100" r="90" fill="#00ccff" clip-path="url(#bottomHalf)"/>
  <line x1="40" y1="92" x2="160" y2="92" stroke="#00ccff" stroke-opacity="0.7" stroke-width="1" filter="url(#glow)"/>
  <line x1="40" y1="108" x2="160" y2="108" stroke="#00ccff" stroke-opacity="0.7" stroke-width="1" filter="url(#glow)"/>
  <text x="100" y="100" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="14" fill="#00ccff" filter="url(#glow)">MOSAID Tutorials</text>
    </g>
  </g>

  <!-- Floating geometry -->
  <g opacity="0.1">
    <circle cx="100" cy="570" r="8" fill="none" stroke="#94a3b8" stroke-width="2">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="1150" cy="130" r="12" fill="none" stroke="#94a3b8" stroke-width="1.5">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,10; 0,0" dur="7s" repeatCount="indefinite" />
    </circle>
    <polygon points="560,80 570,100 550,110" fill="none" stroke="#94a3b8" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="0 560 95; 10 560 95; 0 560 95" dur="10s" repeatCount="indefinite" />
    </polygon>
  </g>

  <!-- Decorative bracket -->
  <g opacity="0.08" fill="none" stroke="#f5c2e7" stroke-width="4" font-family="'JetBrains Mono', monospace" font-size="90" font-weight="bold">
    <text x="980" y="550" fill="#f5c2e7" stroke="none">&#123; &#125;
      <animate attributeName="opacity" values="0.6; 1; 0.6" dur="6s" repeatCount="indefinite" />
    </text>
  </g>
  <rect width="1200" height="630" fill="url(#scanlines)" pointer-events="none" />
  <!-- Title block -->
  <text x="85" y="120" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="44" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" opacity="0.3" filter="url(#titleGlow)">Git Mastery</text>
  <text x="85" y="120" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="44" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" filter="url(#titleShadow)">Git Mastery</text>
  <rect x="85" y="149" width="360" height="3" rx="1.5" fill="url(#titleGrad)" opacity="0.35" filter="url(#titleGlow)" />
  <text x="85" y="188" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="16" fill="#a6adc8" font-weight="600"  text-anchor="start" >Branching strategies and collaborative workflows</text>
  <!-- Meta & progress -->
  <text x="85" y="252" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="22" fill="#6c7086" font-weight="600" text-anchor="start">Article 4 · Version Control</text>
  <rect x="85" y="277" width="560" height="6" rx="3" fill="#313244" />
  <rect x="85" y="277" width="280" height="6" rx="3" fill="url(#progressGradMid)" />
  <text x="85" y="301" font-family="'JetBrains Mono', monospace" font-size="13" fill="#6c7086">Part 4 of 8</text>

  <!-- Separator & tagline -->
  <line x1="85" y1="527" x2="645" y2="527" stroke="#45475a" stroke-width="0.5" opacity="0.5" />
  <text x="85" y="548" font-family="'Inter', sans-serif" font-size="16"
        fill="#6c7086" font-style="italic" text-anchor="start">
    Stop fearing merge conflicts
  </text>

    <!-- Terminal window -->
    <g filter="url(#termGlow)">
        <rect x="700" y="80" width="440" height="206" rx="12" fill="#1e1e2e" fill-opacity="0.92" stroke="#313244" stroke-width="2" />
        <rect x="700" y="80" width="440" height="32" rx="12" fill="#45475a" />
        <rect x="700" y="92" width="440" height="20" fill="#45475a" />
