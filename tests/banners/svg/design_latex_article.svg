<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet" width="1200" height="630">
  <defs>
<!-- Background gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf9f6" />
      <stop offset="50%" stop-color="#f0f0ea" />
      <stop offset="100%" stop-color="#faf9f6" />
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="50%" stop-color="#000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000" stop-opacity="0.35" />
    </radialGradient>
    <linearGradient id="keyLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>

    <!-- Patterns -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#bbbbbb" opacity="0.12" />
    </pattern>
    <pattern id="grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#bbbbbb" stroke-width="0.5" opacity="0.06" />
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="2" x2="4" y2="2" stroke="#ffffff" stroke-width="1" opacity="0.03" />
    </pattern>

    <!-- Title gradient & filters -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d2d2d" />
      <stop offset="50%" stop-color="#444444" />
      <stop offset="100%" stop-color="#666666" />
    </linearGradient>
    <filter id="titleShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
      <feFlood flood-color="#94a3b8" flood-opacity="0.25" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Terminal glow -->
    <filter id="termGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur" />
      <feFlood flood-color="#94a3b8" flood-opacity="0.15" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Progress gradients -->
    
    <linearGradient id="progressGradLow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2e7d32" />
      <stop offset="100%" stop-color="#bdbdbd" />
    </linearGradient>
    <linearGradient id="progressGradMid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f57c00" />
      <stop offset="100%" stop-color="#bdbdbd" />
    </linearGradient>
    <linearGradient id="progressGradHigh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c62828" />
      <stop offset="100%" stop-color="#bdbdbd" />
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Vignette + key light -->
  <rect width="1200" height="630" fill="url(#vignette)" pointer-events="none" />
  <rect width="1200" height="630" fill="url(#keyLight)" pointer-events="none" />

  <!-- Watermark (single, rotating vector) -->
  <g transform="translate(780.00, 470.00) scale(0.6)" opacity="0.2">
    <g>
      <animateTransform attributeName="transform" type="rotate"
        from="0 100.00 100.00" to="360 100.00 100.00"
        dur="40s" repeatCount="indefinite" />
      <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="stripes" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="3" fill="#00ccff"/>
      <rect y="3" width="6" height="3" fill="transparent"/>
    </pattern>
    <clipPath id="topHalf"><rect x="0" y="0" width="200" height="85"/></clipPath>
    <clipPath id="bottomHalf"><rect x="0" y="115" width="200" height="85"/></clipPath>
  </defs>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#00ccff" stroke-opacity="0.6" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="90" fill="url(#stripes)" clip-path="url(#topHalf)"/>
  <circle cx="100" cy="100" r="90" fill="#00ccff" clip-path="url(#bottomHalf)"/>
  <line x1="40" y1="92" x2="160" y2="92" stroke="#00ccff" stroke-opacity="0.7" stroke-width="1" filter="url(#glow)"/>
  <line x1="40" y1="108" x2="160" y2="108" stroke="#00ccff" stroke-opacity="0.7" stroke-width="1" filter="url(#glow)"/>
  <text x="100" y="100" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="14" fill="#00ccff" filter="url(#glow)">MOSAID Tutorials</text>
    </g>
  </g>
  <!-- Title block -->
  <text x="85" y="100" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="52" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" opacity="0.3" filter="url(#titleGlow)">LaTeX Typesetting</text>
  <text x="85" y="100" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="52" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" filter="url(#titleShadow)">LaTeX Typesetting</text>
  <rect x="85" y="133" width="360" height="3" rx="1.5" fill="url(#titleGrad)" opacity="0.35" filter="url(#titleGlow)" />
  <text x="85" y="176" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="22" fill="#4a4a4a" font-weight="600"  text-anchor="start" >Write beautiful documents with LaTeX</text>
  <!-- Meta & progress -->
  <text x="85" y="244" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="22" fill="#808080" font-weight="600" text-anchor="start">Article 5 · Scientific Writing</text>
  <rect x="85" y="269" width="560" height="6" rx="3" fill="#e0e0d8" />
  <rect x="85" y="269" width="233" height="6" rx="3" fill="url(#progressGradMid)" />
  <text x="85" y="293" font-family="'JetBrains Mono', monospace" font-size="13" fill="#808080">Part 5 of 12</text>

  <!-- Separator & tagline -->
  <line x1="85" y1="527" x2="645" y2="527" stroke="#cccccc" stroke-width="0.5" opacity="0.5" />
  <text x="85" y="548" font-family="'Inter', sans-serif" font-size="16"
        fill="#808080" font-style="italic" text-anchor="start">
    Typesetting for mathematicians and scientists
  </text>
<rect x="85" y="684" width="267.2" height="260" rx="6" fill="#2d2d2d" stroke="#555555" stroke-width="1.5" />
<rect x="85" y="684" width="267.2" height="28" rx="6" fill="#3c3c3c" />
<text x="97" y="704" font-family="'JetBrains Mono', monospace" font-size="12" fill="#eeeeee">minimal.tex</text>
<text x="93" y="738" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888888" text-anchor="end">1</text>
<text x="125" y="738" font-family="'JetBrains Mono', monospace" font-size="13">
<tspan fill="#f8f8f2" font-weight="bold">\documentclass</tspan>
<tspan fill="#f8f8f2" >{</tspan>
<tspan fill="#f8f8f2" >article</tspan>
<tspan fill="#f8f8f2" >}</tspan>
</text>
<text x="93" y="758" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888888" text-anchor="end">2</text>
<text x="125" y="758" font-family="'JetBrains Mono', monospace" font-size="13">
<tspan fill="#f8f8f2" font-weight="bold">\usepackage</tspan>
<tspan fill="#f8f8f2" >{</tspan>
<tspan fill="#f8f8f2" >amsmath</tspan>
<tspan fill="#f8f8f2" >}</tspan>
</text>
<text x="93" y="778" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888888" text-anchor="end">3</text>
<text x="125" y="778" font-family="'JetBrains Mono', monospace" font-size="13">
<tspan fill="#f8f8f2" font-weight="bold">\begin</tspan>
<tspan fill="#f8f8f2" >{</tspan>
<tspan fill="#f8f8f2" >document</tspan>
<tspan fill="#f8f8f2" >}</tspan>
</text>
<text x="93" y="798" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888888" text-anchor="end">4</text>
<text x="125" y="798" font-family="'JetBrains Mono', monospace" font-size="13">
<tspan fill="#f8f8f2" font-weight="bold">\title</tspan>
<tspan fill="#f8f8f2" >{</tspan>
<tspan fill="#f8f8f2" >My Paper</tspan>
<tspan fill="#f8f8f2" >}</tspan>
</text>
<text x="93" y="818" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888888" text-anchor="end">5</text>
<text x="125" y="818" font-family="'JetBrains Mono', monospace" font-size="13">
<tspan fill="#f8f8f2" font-weight="bold">\author</tspan>
<tspan fill="#f8f8f2" >{</tspan>
<tspan fill="#f8f8f2" >You</tspan>
<tspan fill="#f8f8f2" >}</tspan>
</text>
<text x="93" y="838" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888888" text-anchor="end">6</text>
<text x="125" y="838" font-family="'JetBrains Mono', monospace" font-size="13">
<tspan fill="#f8f8f2" font-weight="bold">\maketitle</tspan>
</text>
<text x="93" y="858" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888888" text-anchor="end">7</text>
<text x="125" y="858" font-family="'JetBrains Mono', monospace" font-size="13">
<tspan fill="#f8f8f2" font-weight="bold">\section</tspan>
<tspan fill="#f8f8f2" >{</tspan>
<tspan fill="#f8f8f2" >Introduction</tspan>
<tspan fill="#f8f8f2" >}</tspan>
</text>
<text x="93" y="878" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888888" text-anchor="end">8</text>
<text x="125" y="878" font-family="'JetBrains Mono', monospace" font-size="13">
<tspan fill="#f8f8f2" font-weight="bold">\begin</tspan>
<tspan fill="#f8f8f2" >{</tspan>
<tspan fill="#f8f8f2" >equation</tspan>
<tspan fill="#f8f8f2" >}</tspan>
</text>
<text x="93" y="898" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888888" text-anchor="end">9</text>
<text x="125" y="898" font-family="'JetBrains Mono', monospace" font-size="13">
<tspan fill="#f8f8f2" >    E = mc</tspan>
<tspan fill="#f8f8f2" >^</tspan>
<tspan fill="#f8f8f2" >2
</tspan>
</text>
<text x="93" y="918" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888888" text-anchor="end">10</text>
<text x="125" y="918" font-family="'JetBrains Mono', monospace" font-size="13">
<tspan fill="#f8f8f2" font-weight="bold">\end</tspan>
<tspan fill="#f8f8f2" >{</tspan>
<tspan fill="#f8f8f2" >equation</tspan>
<tspan fill="#f8f8f2" >}</tspan>
</text>
<text x="93" y="938" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888888" text-anchor="end">11</text>
<text x="125" y="938" font-family="'JetBrains Mono', monospace" font-size="13">
<tspan fill="#f8f8f2" font-weight="bold">\end</tspan>
<tspan fill="#f8f8f2" >{</tspan>
<tspan fill="#f8f8f2" >document</tspan>
<tspan fill="#f8f8f2" >}</tspan>
</text>

  <!-- Series badge -->
  <rect x="85" y="25" width="220" height="36" rx="18"
        fill="#e0e0e0" opacity="0.8" stroke="#757575" stroke-width="1.5" />
  <text x="97.0" y="43.0" font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="16" fill="#1e1e1e" font-weight="600"
        text-anchor="start" dominant-baseline="central" letter-spacing="1.5">LATEX MASTERY</text>

<rect x="85" y="679" width="500" height="84" rx="8" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.5" />
<text x="100" y="699" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">LaTeX</text>
<text x="100" y="723" font-family="'Inter', sans-serif" font-size="16" fill="#212121">A high-quality typesetting system designed for the productio</text>
<text x="100" y="745" font-family="'Inter', sans-serif" font-size="16" fill="#212121">n of technical and scientific documentation.</text>
<text x="85" y="898" font-family="'Georgia', serif" font-style="italic" font-size="18" fill="#212121" text-anchor="start" wrap="true">LaTeX is not a word processor; it encourages authors to focus on content, not formatting.</text>
<text x="105" y="926" font-family="'Inter', sans-serif" font-size="16" fill="#5d4037">— Leslie Lamport</text>
<text x="105" y="942" font-family="'Inter', sans-serif" font-size="14" fill="#5d4037" opacity="0.7">LaTeX: A Document Preparation System</text>
<rect x="75" y="969" width="759.2" height="43" rx="8" fill="#eeeeee" opacity="0.5" />
<text x="85" y="1002" font-family="'Times New Roman', 'STIXGeneral', 'Latin Modern Math', serif" font-style="italic" font-size="28" fill="#bf360c" text-anchor="start">\int_-\infty^\infty e<tspan dy="-6" font-size="0.7em"></tspan>-x<tspan dy="-6" font-size="0.7em">2</tspan> dx = \sqrt\pi</text>
  <!-- Status badges -->
  <rect x="230" y="579" width="52.0" height="28" rx="4" fill="#e0e0e0" opacity="0.7" stroke="#757575" stroke-width="1" />
  <text x="256.0" y="593.0" text-anchor="middle" dominant-baseline="central" font-family="'JetBrains Mono', monospace" font-size="12" fill="#1e1e1e">LaTeX</text>
  <rect x="290.0" y="579" width="88.0" height="28" rx="4" fill="#e0e0e0" opacity="0.7" stroke="#757575" stroke-width="1" />
  <text x="334.0" y="593.0" text-anchor="middle" dominant-baseline="central" font-family="'JetBrains Mono', monospace" font-size="12" fill="#1e1e1e">scientific</text>
  <rect x="386.0" y="579" width="88.0" height="28" rx="4" fill="#e0e0e0" opacity="0.7" stroke="#757575" stroke-width="1" />
  <text x="430.0" y="593.0" text-anchor="middle" dominant-baseline="central" font-family="'JetBrains Mono', monospace" font-size="12" fill="#1e1e1e">publishing</text>
  <!-- Social icons -->
  <svg x="85" y="578.0" width="24" height="24" viewBox="0 0 24 24" fill="#5c6bc0" opacity="0.8"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.757-1.333-1.757-1.09-.745.083-.73.083-.73 1.205.085 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.604-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/></svg>
  <svg x="121" y="578.0" width="24" height="24" viewBox="0 0 24 24" fill="#5c6bc0" opacity="0.8"><path d="M23.643 4.937c-.835.37-1.732.62-2.675.733.962-.576 1.7-1.49 2.048-2.578-.9.534-1.897.922-2.958 1.13-.85-.904-2.06-1.47-3.4-1.47-2.572 0-4.658 2.086-4.658 4.66 0 .364.042.718.12 1.06-3.873-.195-7.304-2.05-9.602-4.868-.4.69-.63 1.49-.63 2.342 0 1.616.823 3.043 2.072 3.878-.764-.025-1.482-.234-2.11-.583v.06c0 2.257 1.605 4.14 3.737 4.568-.392.106-.803.162-1.227.162-.3 0-.593-.028-.877-.082.593 1.85 2.313 3.198 4.352 3.234-1.595 1.25-3.604 1.995-5.786 1.995-.376 0-.747-.022-1.112-.065 2.062 1.323 4.51 2.093 7.14 2.093 8.57 0 13.255-7.098 13.255-13.254 0-.2-.005-.402-.014-.602.91-.658 1.7-1.477 2.323-2.41z"/></svg>
  <svg x="157" y="578.0" width="24" height="24" viewBox="0 0 24 24" fill="#5c6bc0" opacity="0.8"><path d="M23.5 6.19a3.02 3.02 0 00-2.12-2.14C19.48 3.5 12 3.5 12 3.5s-7.48 0-9.38.55A3.02 3.02 0 00.5 6.19 32.39 32.39 0 000 12a32.39 32.39 0 00.5 5.81 3.02 3.02 0 002.12 2.14c1.9.55 9.38.55 9.38.55s7.48 0 9.38-.55a3.02 3.02 0 002.12-2.14 32.39 32.39 0 00.5-5.81 32.39 32.39 0 00-.5-5.81zM9.54 15.57V8.43L15.82 12l-6.28 3.57z"/></svg>

