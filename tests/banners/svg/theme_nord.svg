  <text x="85" y="120" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="44" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" filter="url(#titleShadow)">Setting Up Pelican Like a</text>
  <text x="85" y="168" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="44" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" opacity="0.3" filter="url(#titleGlow)">Developer (Not a Beginner)</text>
  <text x="85" y="168" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="44" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" filter="url(#titleShadow)">Developer (Not a Beginner)</text>
  <text x="85" y="216" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="44" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" opacity="0.3" filter="url(#titleGlow)">– Static, But Smarter</text>
  <text x="85" y="216" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="44" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" filter="url(#titleShadow)">– Static, But Smarter</text>
