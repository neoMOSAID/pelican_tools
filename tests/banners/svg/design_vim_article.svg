  <text x="746" y="247" font-family="'JetBrains Mono', monospace" font-size="15" fill="#f8f8f2">-- Lazy.nvim setup</text>
  <text x="718" y="269" font-family="'JetBrains Mono', monospace" font-size="13" fill="#6272a4" text-anchor="end">7</text>
  <text x="746" y="269" font-family="'JetBrains Mono', monospace" font-size="15" fill="#f8f8f2">require('lazy').setup({</text>
