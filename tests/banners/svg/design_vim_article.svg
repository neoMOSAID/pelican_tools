<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet" width="1200" height="630">
  <defs>
<!-- Background gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#282a36" />
      <stop offset="50%" stop-color="#44475a" />
      <stop offset="100%" stop-color="#282a36" />
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="50%" stop-color="#000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000" stop-opacity="0.35" />
    </radialGradient>
    <linearGradient id="keyLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>

    <!-- Patterns -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#50fa7b" opacity="0.12" />
    </pattern>
    <pattern id="grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#50fa7b" stroke-width="0.5" opacity="0.06" />
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="2" x2="4" y2="2" stroke="#ffffff" stroke-width="1" opacity="0.03" />
    </pattern>

    <!-- Title gradient & filters -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8f8f2" />
      <stop offset="50%" stop-color="#f1fa8c" />
      <stop offset="100%" stop-color="#50fa7b" />
    </linearGradient>
    <filter id="titleShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
      <feFlood flood-color="#94a3b8" flood-opacity="0.25" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Terminal glow -->
    <filter id="termGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur" />
      <feFlood flood-color="#94a3b8" flood-opacity="0.15" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Progress gradients -->
    
    <linearGradient id="progressGradLow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#50fa7b" />
      <stop offset="100%" stop-color="#f1fa8c" />
    </linearGradient>
    <linearGradient id="progressGradMid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f1fa8c" />
      <stop offset="100%" stop-color="#f1fa8c" />
    </linearGradient>
    <linearGradient id="progressGradHigh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5555" />
      <stop offset="100%" stop-color="#f1fa8c" />
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Vignette + key light -->
  <rect width="1200" height="630" fill="url(#vignette)" pointer-events="none" />
  <rect width="1200" height="630" fill="url(#keyLight)" pointer-events="none" />

  <!-- Watermark (single, rotating vector) -->
  <g transform="translate(720.00, 410.00) scale(0.9)" opacity="0.3">
    <g>
      <animateTransform attributeName="transform" type="rotate"
        from="0 100.00 100.00" to="360 100.00 100.00"
        dur="25s" repeatCount="indefinite" />
      <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="stripes" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="3" fill="#00ccff"/>
      <rect y="3" width="6" height="3" fill="transparent"/>
    </pattern>
    <clipPath id="topHalf"><rect x="0" y="0" width="200" height="85"/></clipPath>
    <clipPath id="bottomHalf"><rect x="0" y="115" width="200" height="85"/></clipPath>
  </defs>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#00ccff" stroke-opacity="0.6" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="90" fill="url(#stripes)" clip-path="url(#topHalf)"/>
  <circle cx="100" cy="100" r="90" fill="#00ccff" clip-path="url(#bottomHalf)"/>
  <line x1="40" y1="92" x2="160" y2="92" stroke="#00ccff" stroke-opacity="0.7" stroke-width="1" filter="url(#glow)"/>
  <line x1="40" y1="108" x2="160" y2="108" stroke="#00ccff" stroke-opacity="0.7" stroke-width="1" filter="url(#glow)"/>
  <text x="100" y="100" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="14" fill="#00ccff" filter="url(#glow)">MOSAID Tutorials</text>
    </g>
  </g>

  <!-- Code rain -->
  <g opacity="0.03" font-family="'JetBrains Mono', monospace" font-size="16" fill="#f8f8f2">
    <text x="50" y="180">def build():</text>
    <text x="230" y="260">&lt;html&gt;</text>
    <text x="500" y="210">import pelican</text>
    <text x="180" y="510">class Site</text>
    <text x="850" y="590">git commit</text>
    <text x="1050" y="170">pip install</text>
    <text x="300" y="560">yaml.load</text>
  </g>

  <!-- Floating geometry -->
  <g opacity="0.1">
    <circle cx="100" cy="570" r="8" fill="none" stroke="#50fa7b" stroke-width="2">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="1150" cy="130" r="12" fill="none" stroke="#50fa7b" stroke-width="1.5">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,10; 0,0" dur="7s" repeatCount="indefinite" />
    </circle>
    <polygon points="560,80 570,100 550,110" fill="none" stroke="#50fa7b" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="0 560 95; 10 560 95; 0 560 95" dur="10s" repeatCount="indefinite" />
    </polygon>
  </g>

  <!-- Decorative bracket -->
  <g opacity="0.08" fill="none" stroke="#ff79c6" stroke-width="4" font-family="'JetBrains Mono', monospace" font-size="90" font-weight="bold">
    <text x="980" y="550" fill="#ff79c6" stroke="none">&#123; &#125;
      <animate attributeName="opacity" values="0.6; 1; 0.6" dur="6s" repeatCount="indefinite" />
    </text>
  </g>
  <rect width="1200" height="630" fill="url(#scanlines)" pointer-events="none" />
  <!-- Title block -->
  <text x="85" y="120" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="44" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" opacity="0.3" filter="url(#titleGlow)">Vim Wizardry</text>
  <text x="85" y="120" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="44" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" filter="url(#titleShadow)">Vim Wizardry</text>
  <rect x="85" y="149" width="360" height="3" rx="1.5" fill="url(#titleGrad)" opacity="0.35" filter="url(#titleGlow)" />
  <text x="85" y="178" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="44" fill="url(#titleGrad)" font-weight="800"  text-anchor="start" filter="url(#titleShadow)" letter-spacing="-1.5">Beyond the Basics</text>
  <text x="85" y="246" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="16" fill="#bd93f9" font-weight="600"  text-anchor="start" >Learn the keystrokes that make you fly</text>
