  <text x="746" y="291" font-family="'JetBrains Mono', monospace" font-size="15" fill="#f8f8f2">  'tpope/vim-sensible',</text>
  <text x="718" y="313" font-family="'JetBrains Mono', monospace" font-size="13" fill="#6272a4" text-anchor="end">9</text>
  <text x="746" y="313" font-family="'JetBrains Mono', monospace" font-size="15" fill="#f8f8f2">})</text>
  <rect x="700" y="378" width="440" height="22" rx="0" fill="#50fa7b" />
