  <text x="920.0" y="102" font-family="'Inter', sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle" font-weight="500">VIM – init.lua</text>
  <text x="718" y="137" font-family="'JetBrains Mono', monospace" font-size="13" fill="#6272a4" text-anchor="end">1</text>
  <text x="746" y="137" font-family="'JetBrains Mono', monospace" font-size="15" fill="#f8f8f2">vim.opt.number = true</text>
  <text x="718" y="159" font-family="'JetBrains Mono', monospace" font-size="13" fill="#6272a4" text-anchor="end">2</text>
  <text x="746" y="159" font-family="'JetBrains Mono', monospace" font-size="15" fill="#f8f8f2">vim.opt.relativenumber = true</text>
  <text x="718" y="181" font-family="'JetBrains Mono', monospace" font-size="13" fill="#6272a4" text-anchor="end">3</text>
